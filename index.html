<!doctype html>
<html lang="en">
  <head>
    <script>
      const match = document.cookie.match(/(?:^|; )theme=([^;]*)/)
      const theme = match && decodeURIComponent(match[1]) === "light" ? "light" : "dark"
      document.documentElement.setAttribute("data-theme", theme)
    </script>
